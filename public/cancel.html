<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — Smart Stretch</title>
  <style>
    :root {
      --bg-1: #1b1f2a;
      --bg-2: #23293a;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --muted: #c7cedd;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .icon { font-size: 52px; margin-bottom: 16px; display: block; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">↩️</span>
    <h1>Payment cancelled</h1>
    <p>No charge was made. You can close this tab and upgrade anytime from the Smart Stretch extension.</p>
  </div>
</body>
</html>
