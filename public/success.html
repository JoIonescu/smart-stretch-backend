<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — Smart Stretch Pro</title>
  <style>
    :root {
      --bg-1: #1b1f2a;
      --bg-2: #23293a;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --muted: #c7cedd;
      --yellow: #ffd400;
      --orange: #ff7a00;
      --green: #34c759;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .pro-badge {
      display: inline-block;
      background: var(--yellow);
      color: #1b1f2a;
      font-size: 11px;
      font-weight: 800;
      border-radius: 20px;
      padding: 4px 14px;
      letter-spacing: 0.4px;
      margin-bottom: 20px;
    }

    .icon { font-size: 52px; margin-bottom: 16px; display: block; }

    h1 {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.2px;
      margin-bottom: 10px;
    }

    p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      margin: 20px 0;
      text-align: left;
    }

    .feature-icon { font-size: 18px; min-width: 24px; text-align: center; }

    .btn-done {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      background: var(--green);
      color: #0f1b12;
      transition: transform 0.15s ease;
      margin-top: 4px;
    }
    .btn-done:hover { transform: translateY(-1px); }
    .btn-done:active { transform: translateY(0); }

    .note { margin-top: 14px; font-size: 11px; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="pro-badge">✨ Pro</div>
    <span class="icon">🎉</span>
    <h1>You're now on Pro!</h1>
    <p>Payment successful. Go back to the extension and click <strong>Verify Payment</strong> to unlock everything instantly.</p>

    <div class="feature">
      <div class="feature-icon">📅</div>
      Skip during meetings — Google Calendar
    </div>

    <button class="btn-done" onclick="window.close()">Done — close this tab</button>

    <div class="note">Features unlock the moment you click Verify Payment in the extension.</div>
  </div>
</body>
</html>
