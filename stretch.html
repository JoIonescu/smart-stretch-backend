<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Stretch</title>
<style>
:root {
--bg-1: #1b1f2a;
--bg-2: #23293a;
--text: #ffffff;
--muted: #c7cedd;
--yellow: #ffd400;
--orange: #ff7a00;
--blue: #5aa9ff;
--red: #ff8a80;
--green: #34c759;
}

* {
box-sizing: border-box;
}

html, body {
margin: 0;
width: 100%;
height: 100%;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background: radial-gradient(circle at top, #2b3348 0%, var(--bg-1) 40%, #151923 100%);
color: var(--text);
overflow: hidden;
}

body {
display: flex;
align-items: center;
justify-content: center;
padding: 24px;
}

.screen {
width: 100%;
max-width: 760px;
min-height: 700px;
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.10);
border-radius: 28px;
backdrop-filter: blur(10px);
box-shadow: 0 20px 50px rgba(0,0,0,0.35);
padding: 28px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
position: relative;
overflow: hidden;
}

.top {
text-align: center;
margin-top: 6px;
}

.eyebrow {
font-size: 14px;
font-weight: 700;
color: var(--yellow);
margin-bottom: 10px;
letter-spacing: 0.3px;
}

.title {
font-size: 34px;
font-weight: 800;
line-height: 1.15;
margin-bottom: 10px;
}

.subtitle {
font-size: 16px;
color: var(--muted);
line-height: 1.5;
max-width: 560px;
margin: 0 auto;
}

.center-zone {
display: flex;
flex-direction: column;
align-items: center;
gap: 22px;
width: 100%;
flex: 1;
justify-content: center;
}

.pulse-wrap {
width: 290px;
height: 290px;
position: relative;
display: grid;
place-items: center;
border-radius: 50%;
animation: breathe 10s ease-in-out infinite;
}

@keyframes breathe {
0% { transform: scale(0.96); }
50% { transform: scale(1.04); }
100% { transform: scale(0.96); }
}

.progress-ring {
width: 290px;
height: 290px;
position: absolute;
inset: 0;
transform: rotate(-90deg);
pointer-events: none;
}

.ring-bg {
fill: none;
stroke: rgba(255,255,255,0.10);
stroke-width: 8;
}

.ring-progress {
fill: none;
stroke: url(#gradStroke);
stroke-width: 8;
stroke-linecap: round;
transition: stroke-dashoffset 1s linear;
}

.inner-circle {
width: 230px;
height: 230px;
border-radius: 50%;
background: radial-gradient(circle at 30% 30%, rgba(255,212,0,0.18), rgba(255,122,0,0.10), rgba(255,255,255,0.04));
border: 1px solid rgba(255,255,255,0.10);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
box-shadow: inset 0 0 30px rgba(255,255,255,0.04);
position: relative;
z-index: 2;
text-align: center;
}

.time {
font-size: 56px;
font-weight: 900;
line-height: 1;
color: white;
margin: 0;
}

.time-label {
margin-top: 8px;
font-size: 14px;
color: var(--muted);
font-weight: 600;
}

.exercise {
width: 100%;
max-width: 620px;
text-align: center;
}

.exercise-icon {
font-size: 42px;
margin-bottom: 10px;
}

.exercise-name {
font-size: 24px;
font-weight: 800;
margin-bottom: 8px;
}

.exercise-instruction {
font-size: 16px;
color: var(--muted);
line-height: 1.5;
min-height: 48px;
}

.actions {
width: 100%;
display: flex;
gap: 14px;
margin-top: 10px;
}

.btn {
flex: 1;
border: none;
border-radius: 16px;
padding: 15px 16px;
font-size: 16px;
font-weight: 800;
cursor: pointer;
transition: transform 0.15s ease;
}

.btn:hover {
transform: translateY(-1px);
}

.btn-snooze {
background: var(--blue);
color: #081726;
}

.btn-skip {
background: var(--red);
color: #2b1010;
}

.success {
display: none;
position: absolute;
inset: 0;
width: 100%;
height: 100%;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
gap: 14px;
padding: 28px;
z-index: 20;
}

.success.show {
display: flex;
}

.success-emoji {
font-size: 68px;
position: relative;
z-index: 2;
}

.success-title {
font-size: 34px;
font-weight: 900;
position: relative;
z-index: 2;
}

.success-subtitle {
font-size: 16px;
color: var(--muted);
position: relative;
z-index: 2;
}

#confettiCanvas {
position: absolute;
left: 50%;
transform: translateX(-50%);
bottom: 30px;
width: 100%;
max-width: 520px;
height: 220px;
pointer-events: none;
z-index: 1;
}
</style>
</head>
<body>
<div class="screen" id="stretchScreen">
<div class="top" id="stretchTop">
<div class="eyebrow">Smart Stretch Break</div>
<div class="title" id="sessionTitle">Time to move</div>
<div class="subtitle" id="sessionSubtitle">A short guided stretch to reset your posture and energy.</div>
</div>

<div class="center-zone" id="stretchContent">
<div class="pulse-wrap">
<svg class="progress-ring" viewBox="0 0 120 120">
<defs>
<linearGradient id="gradStroke" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FFD400"></stop>
<stop offset="100%" stop-color="#FF7A00"></stop>
</linearGradient>
</defs>
<circle class="ring-bg" cx="60" cy="60" r="52"></circle>
<circle id="ringProgress" class="ring-progress" cx="60" cy="60" r="52"></circle>
</svg>

<div class="inner-circle">
<div class="time" id="timeRemaining">60</div>
<div class="time-label">seconds</div>
</div>
</div>

<div class="exercise">
<div class="exercise-icon" id="exerciseIcon">🧘</div>
<div class="exercise-name" id="exerciseName">Neck Roll</div>
<div class="exercise-instruction" id="exerciseInstruction">
Gently roll your shoulders back and relax your neck.
</div>
</div>
</div>

<div class="actions" id="stretchActions">
<button id="snoozeBtn" class="btn btn-snooze">Snooze 5 min</button>
<button id="skipBtn" class="btn btn-skip">Skip</button>
</div>

<div class="success" id="successScreen">
<div class="success-emoji">👍</div>
<div class="success-title">Good job!</div>
<div class="success-subtitle">You completed your stretch break.</div>
<canvas id="confettiCanvas"></canvas>
</div>
</div>

<script src="stretch.js"></script>
</body>
</html>
